<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <header>
            <!-- <h1><a href="index.html">Hue</a></h1> -->
            <nav aria-label="Main Navigation">

            <section id="history">
                <h2>Check&#45;In History</h2>
                <p>View your previous check-ins on the emotional map below.</p>
                <div id="history-list">
                </div>
            </section>
            <section id="emotional-map">
                <div class="map-area">
                    <span class="map-label top">Energized</span>
                    <span class="map-label bottom">Exhausted</span>

                    <span class="map-label right">Overwhelmed</span>
