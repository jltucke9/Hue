<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Hue is a color&#45;based emotional check&#45;in app that helps users reflect on mood, intensity, and energy.">
        <meta name="author" content="Jeanne Tucker">

        <title>Hue &#124; Check&#45;In</title>

        <link rel="stylesheet" href="styles.css">
        <script src="scripts.js" defer></script>
    </head>
    <body>
        <header>
            <h1><a href="index.html">Hue</a></h1>
            <nav aria-label="Main Navigation">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="checkin.html">Check&#45;In</a></li>
                    <li><a href="history.html">History</a></li>
                </ul>
            </nav>
        </header>
        <main id="main">
            <section id="checkin">
                <h2>Check&#45;In</h2>
                <section class="step">
                    <h3>What color are you feeling right now?</h3>

                    <label for="color-picker">Choose your mood color</label>

                    <div class="color-wheel">
                        <input type="color" id="color-picker"><span class="magnifier"></span>
                    </div>
                    
                    <button type="button" id="color-next-btn">Next</button>

                </section>
                <section class="step hidden">
                    <h3>How overwhelmed do you feel?</h3>

                    <div class="scale">
                        <span>Calm</span>
                        <span>Overwhelmed</span>
                    </div>

                    <label for="intensity">Intensity Scale</label>
                    <input type="range" id="intensity" min="0" max="10" value="5">
                    
                    <p>Intensity&#58; <span id="intensity-value"></span></p>
                    <button type="button" id="intensity-next-btn">Next</button>

                </section>
                <section class="step hidden">
                    <h3>What is your energy level?</h3>
                    
                    <div class="scale">
                        <span>Exhausted</span>
                        <span>Energized</span>
                    </div>

                    <label for="energy">Energy Scale</label>
                    <input type="range" id="energy" min="0" max="10" value="5">
                    
                    <p>Energy&#58; <span id="energy-value"></span></p>
                    <button type="button" id="save-checkin-btn">Save Check&#45;In</button>
                </section>
            </section>
        </main>
        <footer>
            <p>&copy;2026 Hue. Designed and Developed by Jeanne Tucker.</p>
        </footer>
    </body>
</html>
