<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Hue is a color&#45;based emotional check&#45;in app that helps users reflect on mood, intensity, and energy.">
        <meta name="author" content="Jeanne Tucker">

        <title>Hue &#124; Check&#45;In</title>

        <link rel="stylesheet" href="styles.css">
        <script src="scripts.js" defer></script>

        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    </head>
    <body>
        <header>
            <nav aria-label="Main Navigation">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="checkin.html" class="active">Check&#45;In</a></li>
                    <li><a href="history.html">History</a></li>
                </ul>
            </nav>
        </header>
        <main id="main">
            <section id="checkin">
                <h1>Check&#45;In</h1>
                <section class="step" id="color-selection">
                    <h2>What color are you feeling?</h2>

                    <label for="color-picker">Choose the color that feels right to you.</label>

                    <div class="color-wheel">
                        <input type="hidden" id="color-picker"><span class="magnifier"></span>
                    </div>

                    <div class="selected-color" id="selected-color-display">
                        <span id="selected-color-swatch"></span>
                        <span id="selected-color-text">Your selected color</span>
                    </div>
                    <button type="button" id="color-next-btn" disabled>Next</button>
                </section>

                <!-- Intensity Section -->
                <section class="step hidden" id="intensity-selection">
                    <h2>How intense does this feeling feel?</h2>
                    <label class="helper-text">Use the slider to show how strong this feeling is right now.</label>
                    
                    <input type="range" id="intensity" min="0" max="10" value="5">
                    
                    <div class="scale">
                        <span>Low intensity</span>
                        <span>High intensity</span>
                    </div>
                    
                    <div class="value-wrapper">
                        <span class="value-label">Intensity</span>
                        <span id="intensity-value" class="value-number"></span>
                    </div>

                    <!-- Intensity Buttons -->
                    <div class="step-buttons">
                        <button type="button" class="back-btn" id="back-to-color-btn">
                        <span class="material-symbols-outlined">arrow_back
                        </span>
                        <span>Back</span>
                    </button>
                    <button type="button" class="primary-btn" id="intensity-next-btn">
                        <span>Continue</span>
                        <span class="material-symbols-outlined">arrow_forward
                        </span>
                    </button>
                    </div>
                </section>
                <!-- Energy Section -->
                <section class="step hidden" id="energy-selection">
                    <h2>How much energy do you have?</h2>
                    <label class="helper-text">Use the slider to show how much energy you have right now.</label>

                    <input type="range" id="energy" min="0" max="10" value="5">
             
                    <div class="scale">
                        <span>Low energy</span>
                        <span>High energy</span>
                    </div>

                    <div class="value-wrapper">
                        <span class="value-label">Energy</span>
                        <span id="energy-value" class="value-number"></span>
                    </div>

                    <!-- Energy Buttons -->
                    <div 
                        class="step-buttons">
                        <button 
                            type="button" 
                            class="back-btn"
                            id="back-to-intensity-btn">
                        <span class="material-symbols-outlined">arrow_back
                        </span>
                        <span>Back</span>
                    </button>
                    <button 
                        type="button" 
                        class="primary-btn"
                        id="save-checkin-btn">
                        <span>Save Check&#45;In</span>
                        <span class="material-symbols-outlined">arrow_forward
                        </span>
                    </button>
                    </div>
                </section>
            </section>
        </main>
        <footer>
            <p>&copy;2026 Hue. Designed and Developed by Jeanne Tucker.</p>
        </footer>
    </body>
</html>
